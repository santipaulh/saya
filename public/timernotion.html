<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Temporizador Minimalista</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    #timer {
      font-size: 4em;
      margin-bottom: 30px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>

<body id="body">

  <div id="timer">00:00</div>

  <div class="button-group">
    <button onclick="setTimer(5)">5min</button>
    <button onclick="setTimer(10)">10min</button>
    <button onclick="setTimer(15)">15min</button>
    <button onclick="setTimer(20)">20min</button>
    <button onclick="setTimer(30)">30min</button>
  </div>

  <div class="button-group">
    <button onclick="startTimer()">Continue</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="stopTimer()">Stop</button>
  </div>

  <audio  id="alarm-timer-stopped-by-time" style="display: none;">
    <source src="https://www.w3schools.com/html/horse.ogg" type="audio/ogg">
    <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
  </audio>

  <script>
    let startsAtMs = 0
    let remainingTimeAtMs = 0
    let totalSeconds = 0;
    let interval = null;

    function updateDisplay() {
      console.log(totalSeconds)
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
      const seconds = String(totalSeconds % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${minutes}:${seconds}`;
    }

    function setTimer(min) {
      stopTimer()
      totalSeconds = min * 60;
      updateDisplay();
      document.getElementById("timer").style.color = "#000000"
      document.getElementById("body").style.backgroundColor = "#ffffff"
    }

    function startTimer() {
      if (interval) return
      startsAtMs = Date.now()
      interval = setInterval(() => {
        if (remainingTimeAtMs > 0) {
          remainingTimeAtMs = startsAtMs - Date.now()
          totalSeconds = remainingTimeAtMs;
          updateDisplay();
        } else {
          stopTimer();
          document.getElementById("alarm-timer-stopped-by-time").play()
          document.getElementById("timer").style.color = "#ffffff"
          document.getElementById("body").style.backgroundColor = "#ff0048"
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(interval);
      interval = null;
    }

    function stopTimer() {
      pauseTimer();
      totalSeconds = 0;
      updateDisplay();
    }
  </script>

</body>

</html>
